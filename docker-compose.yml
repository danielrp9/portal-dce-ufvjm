version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dce_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-dce_portal}
      - POSTGRES_USER=${DB_USER:-dce_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-dce_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dce_user} -d ${DB_NAME:-dce_portal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dce_app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./backend/media:/app/media
    environment:
      - DATABASE_URL=postgres://${DB_USER:-dce_user}:${DB_PASSWORD:-dce_password}@db:5432/${DB_NAME:-dce_portal}
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,app}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
